    events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name dojoflow.myvnc.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    server {
        listen 443 ssl;
        server_name dojoflow.myvnc.com;

        ssl_certificate /etc/letsencrypt/live/dojoflow.myvnc.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dojoflow.myvnc.com/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location ~* \.(js|mjs)$ {
            add_header Content-Type application/javascript;
            try_files $uri =404;
        }

        location ~* \.css$ {
            add_header Content-Type text/css;
            try_files $uri =404;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
